server:
  port: 8080

spring:
  application:
    name: tcm-pharmacy

  datasource:
    url: jdbc:mysql://localhost:3306/tcm_pharmacy?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.tcm.pharmacy.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT Configuration
jwt:
  secret: your-jwt-secret-key-here-make-it-long-enough
  expiration: 86400000  # 24 hours in milliseconds

# Logging
logging:
  level:
    com.tcm.pharmacy: debug
